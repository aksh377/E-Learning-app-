<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 100px 0;
            margin-bottom: 50px;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .login-options {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .btn-login {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-user {
            background: #4CAF50;
            color: white;
        }
        .btn-admin {
            background: #2196F3;
            color: white;
        }
        .btn-login:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .icon-circle i {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="hero-section text-center">
        <h1 class="display-4 fw-bold">Welcome to E-Learning Platform</h1>
        <p class="lead">Access quality education from anywhere, anytime</p>
    </div>

    <div class="container login-options">
        <div class="row">
            <div class="col-md-6">
                <div class="login-card text-center">
                    <div class="icon-circle">
                        <i class="fas fa-user-graduate text-primary"></i>
                    </div>
                    <h3>Student Login</h3>
                    <p class="text-muted">Access your courses, assignments, and quizzes</p>
                    <button class="btn btn-login btn-user" onclick="window.location.href='login.html'">
                        Login as Student
                    </button>
                </div>
            </div>
            <div class="col-md-6">
                <div class="login-card text-center">
                    <div class="icon-circle">
                        <i class="fas fa-user-shield text-primary"></i>
                    </div>
                    <h3>Admin Login</h3>
                    <p class="text-muted">Manage courses, users, and content</p>
                    <button class="btn btn-login btn-admin" onclick="window.location.href='admin_login.html'">
                        Login as Admin
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</body>
</html>
