<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - E-Learning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .btn-login {
            background: #4CAF50;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn-login:hover {
            background: #45a049;
            color: white;
        }
        .back-link {
            color: #4CAF50;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .back-link:hover {
            color: #45a049;
        }
        .alert {
            display: none;
            margin-top: 20px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="login-card">
            <h2 class="text-center mb-4">User Login</h2>
            <form id="userLoginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>
            <div class="alert alert-success" role="alert" id="successAlert">
                Login successful! Redirecting...
            </div>
            <div class="alert alert-danger" role="alert" id="errorAlert">
                Invalid credentials. Please try again.
            </div>
            <div class="register-link">
                <p>Don't have an account? <a href="register.html" class="back-link">Register here</a></p>
            </div>
            <div class="text-center">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#userLoginForm').on('submit', function(e) {
                e.preventDefault();
                
                const email = $('#email').val();
                const password = $('#password').val();

                // Basic validation
                if (!email || !password) {
                    $('#errorAlert').text('Please fill in all fields').show();
                    return;
                }

                // Send login request to backend
                $.ajax({
                    url: 'http://localhost:5000/api/auth/login',
                    method: 'POST',
                    data: JSON.stringify({
                        email: email,
                        password: password
                    }),
                    contentType: 'application/json',
                    success: function(response) {
                        // Store token and user data in localStorage
                        localStorage.setItem('userToken', response.token);
                        localStorage.setItem('userId', response.user.id);
                        localStorage.setItem('userName', response.user.name);
                        localStorage.setItem('userRole', response.user.role);
                        
                        // Show success message
                        $('#successAlert').show();
                        $('#errorAlert').hide();
                        
                        // Redirect to main page after 1 second
                        setTimeout(() => {
                            window.location.href = 'main.html';
                        }, 1000);
                    },
                    error: function(xhr) {
                        $('#errorAlert').text(xhr.responseJSON?.message || 'Login failed. Please try again.').show();
                        $('#successAlert').hide();
                    }
                });
            });
        });
    </script>
</body>
</html>
