<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - E-Learning System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .btn-login {
            background: #2196F3;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn-login:hover {
            background: #1976D2;
            color: white;
        }
        .back-link {
            color: #2196F3;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .back-link:hover {
            color: #1976D2;
        }
        .alert {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container login-container">
        <div class="login-card">
            <h2 class="text-center mb-4">Admin Login</h2>
            <form id="adminLoginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>
            <div class="alert alert-success" role="alert" id="successAlert">
                Login successful! Redirecting...
            </div>
            <div class="alert alert-danger" role="alert" id="errorAlert">
                Invalid credentials. Please try again.
            </div>
            <div class="text-center">
                <a href="index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            // Default admin credentials
            const ADMIN_USERNAME = "admin";
            const ADMIN_PASSWORD = "admin123";
            
            $('#adminLoginForm').on('submit', function(e) {
                e.preventDefault();
                
                const username = $('#username').val();
                const password = $('#password').val();

                // Basic validation
                if (!username || !password) {
                    $('#errorAlert').text('Please fill in all fields').show();
                    return;
                }

                // Check against hardcoded admin credentials
                if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                    // Store admin data in localStorage
                    localStorage.setItem('adminToken', 'admin-token');
                    localStorage.setItem('adminId', 'admin-id');
                    localStorage.setItem('adminName', 'Administrator');
                    localStorage.setItem('isAdmin', 'true');
                    
                    // Show success message
                    $('#successAlert').show();
                    $('#errorAlert').hide();
                    
                    // Redirect to admin dashboard after 1 second
                    setTimeout(() => {
                        window.location.href = 'admin_home.html';
                    }, 1000);
                } else {
                    // Show error message
                    $('#errorAlert').text('Invalid admin credentials. Please try again.').show();
                    $('#successAlert').hide();
                }
            });
        });
    </script>
</body>
</html>
